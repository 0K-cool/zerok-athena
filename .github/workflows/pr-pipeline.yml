name: PR Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/athena-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tools/athena-dashboard/requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install httpx pytest-asyncio

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short
        env:
          # No Neo4j in CI — tests use in-memory fallback
          NEO4J_URI: ""
          NEO4J_USER: ""
          NEO4J_PASS: ""

  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for:
            1. Code correctness and logic errors
            2. Security issues (SQL/Cypher injection, XSS, hardcoded secrets)
            3. Python async/await correctness (FastAPI patterns)
            4. WebSocket handling safety
            5. API response consistency

            Focus on the diff only. Be concise — flag real issues, not style preferences.

  security-review:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          claude-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
