# Langfuse v3 — Self-hosted LLM Observability for ATHENA
# Usage: docker compose -f docker/docker-compose.langfuse.yml --env-file docker/.env.langfuse up -d

services:
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: athena-langfuse-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_PG_PASSWORD}@langfuse-postgres:5432/langfuse
      # Auth
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      # ClickHouse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:${LANGFUSE_CH_PASSWORD}@langfuse-clickhouse:9000/default
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
      # Redis
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      # S3 / MinIO event upload
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # Auto-create org, project, and admin user
      LANGFUSE_INIT_ORG_ID: zerok-labs
      LANGFUSE_INIT_ORG_NAME: ZeroK Labs
      LANGFUSE_INIT_PROJECT_ID: athena
      LANGFUSE_INIT_PROJECT_NAME: ATHENA
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-athena
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_ADMIN_EMAIL}
      LANGFUSE_INIT_USER_NAME: Kelvin Lomboy
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD}
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      langfuse-minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/public/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: athena-langfuse-worker
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_PG_PASSWORD}@langfuse-postgres:5432/langfuse
      # ClickHouse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://default:${LANGFUSE_CH_PASSWORD}@langfuse-clickhouse:9000/default
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
      # Redis
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      # S3 / MinIO
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
    depends_on:
      langfuse-web:
        condition: service_healthy

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: athena-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_PG_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: athena-langfuse-clickhouse
    restart: unless-stopped
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CH_PASSWORD}
    volumes:
      - langfuse_ch_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-redis:
    image: redis:7-alpine
    container_name: athena-langfuse-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - langfuse_redis_data:/data

  langfuse-minio:
    image: minio/minio
    container_name: athena-langfuse-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY}
    command: server /data
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-minio-init:
    image: minio/mc
    container_name: athena-langfuse-minio-init
    depends_on:
      langfuse-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://langfuse-minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/langfuse --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY}

volumes:
  langfuse_pg_data:
  langfuse_ch_data:
  langfuse_redis_data:
  langfuse_minio_data:
